<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flipcard App</title>

<style>
body { font-family: Arial; padding: 20px; }

textarea {
  width: 100%;
  height: 120px;
}

.card {
  margin-top: 20px;
  font-size: 32px;
  border: 2px solid #333;
  padding: 40px;
  text-align: center;
  min-height: 120px;
  position: relative;
}

.controls {
  margin-top: 10px;
}

.hidden {
  display: none;
}

.countdown {
  position: absolute;
  bottom: 10px;
  right: 15px;
  font-size: 18px;
  color: #666;
}
</style>
</head>

<body>

<h2>Flipcard App</h2>

<!-- EDIT MODE -->
<div id="editMode">
  <p>Enter key:value pairs (one per line)</p>
  <textarea id="input"></textarea>

  <div class="controls">
    Key delay (seconds): <input id="keyDelay" type="number" value="3"><br>
    Value delay (seconds): <input id="valueDelay" type="number" value="1"><br>

    <label>
      <input type="checkbox" id="random"> Random order
    </label>
    <br><br>

    <button onclick="exportData()">Export</button>
    <button onclick="importClick()">Import</button>

    <input type="file" id="importFile" accept=".txt,.json"
           onchange="importData(event)" style="display:none;">

    <br><br>
    <button onclick="start()">Run</button>
  </div>
</div>

<!-- RUN MODE -->
<div id="runMode" class="hidden">
  <div class="card">
    <div id="cardText">Ready</div>
    <div class="countdown" id="countdown"></div>
  </div>

  <div class="controls">
    <button onclick="stop()">Stop</button>
  </div>
</div>

<script>
const STORAGE_KEY = "flipcard_data";

let data = [];
let running = false;
let timer = null;
let countdownTimer = null;
let index = 0;

/* -------- LOCAL STORAGE AUTO SAVE -------- */
const inputEl = document.getElementById("input");

window.onload = function () {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    inputEl.value = saved;
  }
};

inputEl.addEventListener("input", function () {
  localStorage.setItem(STORAGE_KEY, inputEl.value);
});

/* -------- PARSE INPUT -------- */
function parseInput(text) {
  return text.split("\n").map(line => {
    let parts = line.split(":");
    return {
      key: parts[0]?.trim(),
      value: parts.slice(1).join(":").trim()
    };
  }).filter(x => x.key && x.value);
}

/* -------- EXPORT -------- */
function exportData() {
  const text = document.getElementById("input").value;

  const blob = new Blob([text], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);

  const a = document.createElement('a');
  a.href = url;
  a.download = 'flipcards.txt';
  a.style.display = 'none';

  document.body.appendChild(a);
  a.click();

  setTimeout(() => {
    if (document.body.contains(a)) {
      window.open(url);
    }
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }, 200);
}

/* -------- IMPORT -------- */
function importClick() {
  document.getElementById("importFile").click();
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(e) {
    document.getElementById("input").value = e.target.result;
    localStorage.setItem(STORAGE_KEY, e.target.result); // also save after import
  };
  reader.readAsText(file);
}

/* -------- SHUFFLE -------- */
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    let j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

/* -------- MODE SWITCH -------- */
function switchToRun() {
  document.getElementById("editMode").classList.add("hidden");
  document.getElementById("runMode").classList.remove("hidden");
}

function switchToEdit() {
  document.getElementById("runMode").classList.add("hidden");
  document.getElementById("editMode").classList.remove("hidden");
}

/* -------- START -------- */
function start() {
  if (running) return;

  data = parseInput(document.getElementById("input").value);
  if (data.length === 0) return;

  if (document.getElementById("random").checked) {
    shuffle(data);
  }

  switchToRun();

  running = true;
  index = 0;
  nextCard();
}

/* -------- STOP -------- */
function stop() {
  running = false;
  clearTimeout(timer);
  clearInterval(countdownTimer);
  switchToEdit();
}

/* -------- COUNTDOWN -------- */
function startCountdown(sec) {
  let remaining = Math.ceil(sec);
  const el = document.getElementById("countdown");

  el.textContent = remaining;

  clearInterval(countdownTimer);
  countdownTimer = setInterval(() => {
    remaining--;
    if (remaining <= 0) {
      el.textContent = "";
      clearInterval(countdownTimer);
    } else {
      el.textContent = remaining;
    }
  }, 1000);
}

/* -------- CARD LOOP -------- */
function nextCard() {
  if (!running) return;

  const textEl = document.getElementById("cardText");

  const keyDelaySec = parseFloat(document.getElementById("keyDelay").value);
  const valueDelaySec = parseFloat(document.getElementById("valueDelay").value);

  const keyDelay = keyDelaySec * 1000;
  const valueDelay = valueDelaySec * 1000;

  const item = data[index];

  textEl.textContent = item.key;
  startCountdown(keyDelaySec);

  timer = setTimeout(() => {
    textEl.textContent = item.value;
    document.getElementById("countdown").textContent = "";

    timer = setTimeout(() => {
      index++;
      if (index >= data.length) index = 0;
      nextCard();
    }, valueDelay);

  }, keyDelay);
}
</script>

</body>
</html>
